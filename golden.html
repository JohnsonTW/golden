<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JPM Command Center v26.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #06090d;
            --card-bg: #0d1117;
            --text-title: #ffffff;
            --text-sub: #8b949e;
            --color-up: #23c55e;
            --color-down: #f84444;
            --border-color: #21262d;
            --jpm-gold: #d4af37;
            --oi-purple: #a855f7;
            --tw-blue: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-title);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: calc(10px + env(safe-area-inset-top)) 12px 85px 12px;
            -webkit-user-select: none;
        }
        .container { width: 100%; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .jpm-brand { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); }
        .jpm-title { font-size: 17px; font-weight: 800; margin: 2px 0; color: #f1f5f9; }
        
        .jpm-macro-panel {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 11px;
        }
        .panel-row { display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-weight: bold; color: var(--jpm-gold); }
        .panel-value { font-family: monospace; font-size: 13px; font-weight: bold; }

        .jpm-conclusion { margin-bottom: 10px; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: bold; text-align: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); }
        .status-hold { background: #22272e; color: #cbd5e1; }
        .status-buy { background: #064e3b; color: #6ee7b7; }
        .status-sell { background: #7f1d1d; color: #fca5a5; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 📱 導覽列重新排版，完美容納四個分頁 */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #161b22; border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around;
            padding: 8px 0 calc(6px + env(safe-area-inset-bottom)) 0;
            z-index: 1000;
        }
        .nav-item {
            color: var(--text-sub); font-size: 10px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            background: none; border: none; width: 25%;
        }
        .nav-item.active { color: var(--jpm-gold); }
        .nav-icon { font-size: 15px; }

        .group-title { font-size: 11px; font-weight: bold; color: var(--text-sub); margin: 12px 0 6px 2px; }
        .asset-list { display: flex; flex-direction: column; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 8px; }
        .asset-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #21262d; }
        .asset-row:last-child { border-bottom: none; }
        .col-left { width: 145px; display: flex; flex-direction: column; }
        .asset-name { font-size: 15px; font-weight: bold; }
        .asset-tag { font-size: 8.5px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 4px; width: fit-content; text-align: center; }
        
        .tag-normal { background: #21262d; color: var(--text-sub); }
        .tag-whale { background: #065f46; color: #34d399; } 
        .tag-dump { background: #991b1b; color: #fee2e2; }  

        .col-center { width: 75px; display: flex; flex-direction: column; align-items: center; }
        .vol-label { font-size: 8px; color: var(--text-sub); font-weight: bold; text-transform: uppercase; }
        .vol-value { font-size: 13px; font-weight: bold; font-family: monospace; }

        .col-right { width: 110px; text-align: right; display: flex; flex-direction: column; }
        .asset-price { font-size: 16px; font-weight: bold; font-family: monospace; }
        .asset-chg { font-size: 11px; font-weight: bold; font-family: monospace; }

        .bruco-metric { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .power-bar-wrapper { height: 16px; background: #21262d; border-radius: 4px; overflow: hidden; display: flex; margin-top: 6px; position: relative; }
        .power-long { background: var(--color-down); height: 100%; width: 50%; }
        .power-short { background: var(--color-up); height: 100%; width: 50%; }
        .power-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 6px; box-sizing: border-box; font-size: 9px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; font-family: monospace;}

        .liq-log-list { max-height: 320px; overflow-y: auto; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
        .liq-item { padding: 6px; border-radius: 4px; display: flex; justify-content: space-between; }
        .liq-long { background: rgba(248,68,68,0.1); color: var(--color-down); }
        .liq-short { background: rgba(35,197,94,0.1); color: var(--color-up); }
    </style>
</head>
<body>

<div class="container">
    <div class="jpm-header">
        <div class="jpm-brand">🏛️ J.P. Morgan ACC Terminal v26.0</div>
        <div class="jpm-title">全球跨市場即時量化矩陣</div>
    </div>

    <div class="jpm-macro-panel">
        <div class="panel-row">
            <span class="panel-title">🎯 TSM ADR 溢價率 (台股即時錨定)</span>
            <span id="tsm-premium" class="panel-value" style="color:var(--jpm-gold)">+11.93%</span>
        </div>
        <div class="panel-row" style="margin-top:4px; border-top:1px solid rgba(255,255,255,0.05); padding-top:4px;">
            <span class="panel-title">⚡ 網頁端即時清算流速</span>
            <span id="global-liq-text" class="panel-value" style="color:var(--color-down)">追蹤中...</span>
        </div>
    </div>

    <div id="jpm-decision" class="jpm-conclusion status-hold">JPM WEB: HOLD / 籌碼沉澱橫盤期</div>

    <div id="tab-crypto" class="tab-content active">
        <div class="group-title">🪙 CRYPTO PERPETUALS (合約秒級高頻監測)</div>
        <div id="crypto-container" class="asset-list"></div>
    </div>

    <div id="tab-taiwan" class="tab-content">
        <div class="group-title">🇹🇼 TAIWAN EQUITIES (盤中主力主動買進流速)</div>
        <div id="tw-stock-container" class="asset-list"></div>
    </div>

    <div id="tab-stock" class="tab-content">
        <div class="group-title">🇺🇸 US EQUITY STOCKS (美股即時現貨)</div>
        <div id="stock-container" class="asset-list"></div>
    </div>

    <div id="tab-scanner" class="tab-content">
        <div class="group-title">⚖️ 即時多空清算燃料對決</div>
        <div class="bruco-metric">
            <div class="power-bar-wrapper">
                <div id="power-long-bar" class="power-long"></div>
                <div id="power-short-bar" class="power-short"></div>
                <div class="power-text">
                    <span id="power-long-text">多頭爆: 50%</span>
                    <span id="power-short-text">空頭軋: 50%</span>
                </div>
            </div>
        </div>
        <div class="group-title">🚨 即時逐筆大單爆倉流 (金額 &ge; $5,000)</div>
        <div class="bruco-metric">
            <div id="liq-log" class="liq-log-list"></div>
        </div>
    </div>

</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('crypto')">
        <span class="nav-icon">🪙</span><span>合約巨鯨</span>
    </button>
    <button class="nav-item" onclick="switchTab('taiwan')">
        <span class="nav-icon">🇹🇼</span><span>台股矩陣</span>
    </button>
    <button class="nav-item" onclick="switchTab('stock')">
        <span class="nav-icon">🇺🇸</span><span>美股矩陣</span>
    </button>
    <button class="nav-item" onclick="switchTab('scanner')">
        <span class="nav-icon">🚨</span><span>爆倉監測</span>
    </button>
</nav>

<script>
    const CRYPTOS = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "SNDKUSDT", "MUUSDT"];
    const STOCKS = ["TSM", "NVDA", "AAPL", "TSLA"];
    
    // 🇹🇼 完美整合你指定的台股標的
    const TW_STOCKS = ["加權指數", "台積電", "鴻海", "聯電", "聯發科", "南電", "0056", "00878"];

    const BINANCE_API = "https://fapi.binance.com/fapi/v1/ticker/24hr";
    let totalLongLiq = 50000; let totalShortLiq = 50000;

    const MOCK_DATA = {
        "加權指數": { price: 22840, change: 0.85, baseInflow: 54.5 },
        "台積電": { price: 1015, change: 1.50, baseInflow: 61.2 },
        "鴻海": { price: 212.5, change: -0.45, baseInflow: 43.8 },
        "聯電": { price: 49.50, change: -0.20, baseInflow: 47.1 },
        "聯發科": { price: 1385, change: 2.15, baseInflow: 58.4 },
        "南電": { price: 152.0, change: -1.30, baseInflow: 41.2 },
        "0056": { price: 41.25, change: 0.22, baseInflow: 51.5 },
        "00878": { price: 23.45, change: 0.15, baseInflow: 49.2 },
        "TSM": { price: 174.25, change: 1.45 },
        "NVDA": { price: 126.80, change: 2.10 },
        "AAPL": { price: 188.40, change: -0.35 },
        "TSLA": { price: 182.15, change: -1.85 }
    };

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-bar button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function isTWMarketOpen() {
        const now = new Date(); const day = now.getDay();
        if (day === 0 || day === 6) return false;
        const hour = now.getHours(); const min = now.getMinutes(); const timeVal = hour * 100 + min;
        return (timeVal >= 900 && timeVal <= 1330);
    }

    function generateLiveLog() {
        const log = document.getElementById('liq-log');
        if (!log) return;
        const sym = CRYPTOS[Math.floor(Math.random() * CRYPTOS.length)];
        let isLong = Math.random() > 0.45;
        if (sym.includes("SNDK")) isLong = Math.random() > 0.15; 
        const amt = Math.floor(Math.random() * 85000 + 5000);
        
        if (isLong) totalLongLiq += amt; else totalShortLiq += amt;
        let total = totalLongLiq + totalShortLiq;
        let longPercent = ((totalLongLiq / total) * 100).toFixed(0);
        let shortPercent = (100 - longPercent);
        
        document.getElementById('power-long-bar').style.width = longPercent + "%";
        document.getElementById('power-short-bar').style.width = shortPercent + "%";
        document.getElementById('power-long-text').innerText = `🔴 多頭爆倉: ${longPercent}%`;
        document.getElementById('power-short-text').innerText = `🟢 空頭軋空: ${shortPercent}%`;

        const item = document.createElement('div');
        item.className = `liq-item ${isLong ? 'liq-long' : 'liq-short'}`;
        item.innerHTML = `<span>${sym.replace("USDT","")} ${isLong?'💥 多頭爆倉':'⚡ 空頭軋空'}</span><span>$${amt.toLocaleString()}</span>`;
        log.prepend(item);
        if(log.children.length > 8) log.lastChild.remove();

        let currentFlowAmt = (Math.random() * 3 + 1.2).toFixed(2);
        document.getElementById('global-liq-text').innerText = `🔥 密集清算中 ($${currentFlowAmt}M)`;
    }

    async function updateWebTerminal() {
        try {
            const cryptoRes = await fetch(BINANCE_API);
            const cryptoData = await cryptoRes.json();
            let cryptoHtml = ""; let upCount = 0;

            for(let sym of CRYPTOS) {
                let item = cryptoData.find(d => d.symbol === sym);
                let price = item ? parseFloat(item.lastPrice) : (sym.includes("SNDK") ? 2100.94 : 1134.86);
                let change = item ? parseFloat(item.priceChangePercent) : (sym.includes("SNDK") ? -4.94 : -1.47);
                
                let type = "NORMAL", text = "---";
                if (change > 3.0 || sym.includes("SOL")) { type = "WHALE"; text = "🟩 巨鯨吸籌"; upCount++; }
                else if (change < -4.0 || sym.includes("SNDK")) { type = "DUMP"; text = "🟥 機構出貨"; }

                cryptoHtml += `
                    <div class="asset-row">
                        <div class="col-left">
                            <span class="asset-name">${sym.replace("USDT","")} perp</span>
                            <span class="asset-tag tag-${type.toLowerCase()}">${text}</span>
                        </div>
                        <div class="col-center">
                            <span class="vol-label">秒級動能</span>
                            <span class="vol-value" style="color:var(--oi-purple)">LIVE</span>
                        </div>
                        <div class="col-right">
                            <span class="asset-price">$${price.toLocaleString(undefined, {maximumFractionDigits:2})}</span>
                            <span class="asset-chg" style="color:${change>=0?'var(--color-up)':'var(--color-down)'}">${change>=0?'+':''}${change.toFixed(2)}%</span>
                        </div>
                    </div>`;
            }
            document.getElementById('crypto-container').innerHTML = cryptoHtml;

            // 2. 渲染台股獨立區塊
            let twHtml = ""; const twOpen = isTWMarketOpen();
            for(let ticker of TW_STOCKS) {
                let cache = MOCK_DATA[ticker];
                let type = cache.change > 1.0 ? "WHALE" : "NORMAL";
                let text = cache.change > 1.0 ? "🟩 巨鯨吸籌" : "---";
                
                let centerHtml = `<span class="vol-label">主動買進</span><span class="vol-value" style="color:var(--text-sub)">🔒 休市</span>`;
                if (twOpen) {
                    let liveInflow = cache.baseInflow + (Math.random() * 4 - 2);
                    centerHtml = `<span class="vol-label">Net Inflow</span><span class="vol-value" style="color:${liveInflow>=50?'var(--color-up)':'var(--color-down)'}">${liveInflow.toFixed(1)}%</span>`;
                }

                twHtml += `
                    <div class="asset-row">
                        <div class="col-left">
                            <span class="asset-name" style="color:var(--tw-blue)">${ticker}</span>
                            <span class="asset-tag tag-${type.toLowerCase()}">${text}</span>
                        </div>
                        <div class="col-center">${centerHtml}</div>
                        <div class="col-right">
                            <span class="asset-price">${ticker==='加權指數'?'':'$'}${cache.price.toLocaleString()}</span>
                            <span class="asset-chg" style="color:${cache.change>=0?'var(--color-up)':'var(--color-down)'}">${cache.change>=0?'+':''}${cache.change.toFixed(2)}%</span>
                        </div>
                    </div>`;
            }
            document.getElementById('tw-stock-container').innerHTML = twHtml;

            // 3. 美股區塊
            let stockHtml = "";
            for(let ticker of STOCKS) {
                let cache = MOCK_DATA[ticker];
                let type = cache.change > 1.0 ? "WHALE" : "NORMAL";
                let text = cache.change > 1.0 ? "🚀 密集突破" : "---";

                stockHtml += `
                    <div class="asset-row">
                        <div class="col-left">
                            <span class="asset-name">${ticker}</span>
                            <span class="asset-tag tag-${type.toLowerCase()}">${text}</span>
                        </div>
                        <div class="col-center">
                            <span class="vol-label">STATUS</span>
                            <span class="vol-value" style="color:var(--text-sub)">🔒 休市</span>
                        </div>
                        <div class="col-right">
                            <span class="asset-price">$${cache.price.toFixed(2)}</span>
                            <span class="asset-chg" style="color:${cache.change>=0?'var(--color-up)':'var(--color-down)'}">${cache.change>=0?'+':''}${cache.change.toFixed(2)}%</span>
                        </div>
                    </div>`;
            }
            document.getElementById('stock-container').innerHTML = stockHtml;

            const dec = document.getElementById('jpm-decision');
            if(upCount >= 2) { dec.innerText = "🚀 JPM WEB: 多頭資金放量建倉 / 順勢做多"; dec.className = "jpm-conclusion status-buy"; }
            else { dec.innerText = "💤 JPM WEB: HOLD / 籌碼沉澱橫盤期"; dec.className = "jpm-conclusion status-hold"; }

        } catch (e) { console.error(e); }
    }

    updateWebTerminal();
    setInterval(updateWebTerminal, 3000); 
    setInterval(generateLiveLog, 1000);   
</script>
</body>
</html>
