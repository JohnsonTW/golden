<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JPM Command Center v32.0</title>
    <style>
        :root { --bg-color: #06090d; --card-bg: #0d1117; --text-title: #ffffff; --text-sub: #8b949e; --color-up: #23c55e; --color-down: #f84444; --border-color: #21262d; --jpm-gold: #d4af37; --tw-blue: #38bdf8; }
        * { box-sizing: border-box; }
        body { background: var(--bg-color); color: var(--text-title); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: calc(10px + env(safe-area-inset-top)) 12px 100px 12px; -webkit-user-select: none; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; position: relative; }
        .jpm-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); }
        .jpm-title { font-size: 19px; font-weight: 800; margin: 2px 0; color: #f1f5f9; }
        .heartbeat-status { position: absolute; top: 12px; right: 8px; font-size: 11px; color: var(--color-up); font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .heartbeat-status.error { color: var(--color-down); }
        .jpm-macro-panel { background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        .panel-row { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
        .panel-title { font-weight: bold; color: var(--jpm-gold); }
        .panel-value { font-family: monospace; font-size: 13px; font-weight: bold; }
        .jpm-conclusion { margin-bottom: 10px; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; text-align: center; }
        .status-hold { background: #22272e; color: #cbd5e1; }
        .status-buy { background: #064e3b; color: #6ee7b7; }
        .status-sell { background: #450a0a; color: #fca5a5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid var(--border-color); display: flex; padding: 10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index: 1000; }
        .nav-item { color: var(--text-sub); font-size: 9.5px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; flex: 1; text-align: center; padding: 0; min-width: 0; }
        .nav-item.active { color: var(--jpm-gold); }
        .nav-icon { font-size: 17px; display: block; }
        .group-title { font-size: 12px; font-weight: bold; color: var(--text-sub); margin: 14px 0 6px 2px; }
        .asset-list { display: flex; flex-direction: column; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 10px; }
        .asset-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #21262d; gap: 6px; }
        .col-left { width: 100px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
        .col-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 0; }
        .col-right { width: 100px; text-align: right; display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
        .asset-name { font-size: 16px; font-weight: bold; }
        .asset-sub { font-size: 10px; color: var(--text-sub); }
        .asset-price { font-size: 16px; font-weight: bold; font-family: monospace; }
        .asset-chg { font-size: 12px; font-weight: bold; font-family: monospace; margin-top: 2px; }
        .tag-whale { background: rgba(35,197,94,0.15); color: #34d399; padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(35,197,94,0.35); font-size: 12px; font-weight: bold; }
        .tag-dump { background: rgba(248,68,68,0.15); color: #fca5a5; padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(248,68,68,0.35); font-size: 12px; font-weight: bold; }
        .tag-warn { background: rgba(212,175,55,0.15); color: var(--jpm-gold); padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(212,175,55,0.35); font-size: 12px; font-weight: bold; }
        .tag-neut { color: var(--text-sub); font-size: 12px; font-family: monospace; }
        .sig-row { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
        .sig { font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
        .sig-buy { background: rgba(35,197,94,0.2); color: #34d399; border: 1px solid rgba(35,197,94,0.4); }
        .sig-sell { background: rgba(248,68,68,0.2); color: #f87171; border: 1px solid rgba(248,68,68,0.4); }
        .sig-neut { background: rgba(139,148,158,0.15); color: #8b949e; border: 1px solid rgba(139,148,158,0.3); }
        .sig-warn { background: rgba(212,175,55,0.2); color: var(--jpm-gold); border: 1px solid rgba(212,175,55,0.4); }
        .bruco-metric { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .power-bar-wrapper { height: 18px; background: #21262d; border-radius: 4px; overflow: hidden; display: flex; margin-top: 6px; position: relative; }
        .power-long { background: var(--color-down); height: 100%; width: 50%; }
        .power-short { background: var(--color-up); height: 100%; width: 50%; }
        .power-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; font-size: 10px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; font-family: monospace; }
        .liq-log-list { max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; display: flex; flex-direction: column; gap: 6px; }
        .liq-item { padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; font-weight: bold; }
        .liq-long { background: rgba(248,68,68,0.12); color: var(--color-down); border-left: 3px solid var(--color-down); }
        .liq-short { background: rgba(35,197,94,0.12); color: var(--color-up); border-left: 3px solid var(--color-up); }
        .config-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .config-input-group { display: flex; gap: 6px; margin-top: 6px; margin-bottom: 4px; }
        .config-select { flex: 1; background: #161b22; border: 1px solid var(--border-color); border-radius: 4px; color: white; padding: 8px; font-size: 13px; outline: none; min-width: 0; }
        .config-input { width: 100px; background: #161b22; border: 1px solid var(--border-color); border-radius: 4px; color: white; padding: 8px; font-size: 13px; min-width: 0; }
        .config-btn { background: var(--jpm-gold); border: none; color: black; font-weight: bold; padding: 8px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; flex-shrink: 0; }
        .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .chip { background: #21262d; padding: 4px 8px; border-radius: 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; color: white; }
        .chip-del { color: var(--color-down); font-weight: bold; cursor: pointer; }
        .data-note { font-size: 10px; color: var(--text-sub); text-align: center; margin-top: 8px; font-family: monospace; line-height: 1.6; }
        .key-input-row { display: flex; gap: 6px; margin-top: 6px; }
        .key-input { flex: 1; background: #161b22; border: 1px solid var(--border-color); border-radius: 4px; color: white; padding: 8px; font-size: 12px; font-family: monospace; }
        .key-save-btn { background: #21262d; border: 1px solid var(--border-color); color: var(--jpm-gold); font-weight: bold; padding: 8px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .loading-row { padding: 20px; text-align: center; color: var(--text-sub); font-size: 12px; }
        @keyframes blink { from {opacity:.5} to {opacity:1} }
        .blinking { animation: blink .8s infinite alternate; }
    </style>
</head>
<body>
    <div class="container">
        <div id="tw-stock-container" class="asset-list"><div class="loading-row blinking">⏳ 連接 TWSE OpenAPI...</div></div>
        </div>

<script>
'use strict';
// ... [前面的變數與函式保持不變] ...

// ── 核心優化：fetchTWStocks ──────────────────────────────────
async function fetchTWStocks() {
    const container = document.getElementById('tw-stock-container');
    const mktState = getTWMarketState();
    document.getElementById('tw-market-status').innerText = mktState.label;
    
    // 如果非開盤時間，直接走 Fallback 節省連線
    if (!mktState.open) {
        container.innerHTML = await fetchTWFallback() + await fetchTWIndex();
        return;
    }

    // 實作批次請求：每 10 檔為一組，加入間隔，避免 403 被鎖
    const BATCH_SIZE = 10;
    let combinedData = [];
    
    for (let i = 0; i < TW_STOCKS.length; i += BATCH_SIZE) {
        const batch = TW_STOCKS.slice(i, i + BATCH_SIZE);
        const query = batch.map(s => `tse_${s}.tw`).join('|');
        const url = `https://mis.twse.com.tw/stock/api/getStockInfo.asp?ex_ch=${encodeURIComponent(query)}&json=1&delay=0`;
        
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('MIS_FAIL');
            const data = await res.json();
            if (data.msgArray) combinedData = combinedData.concat(data.msgArray);
            
            // 重要：加入間隔，防禦頻率限制
            await new Promise(r => setTimeout(r, 500)); 
        } catch(e) {
            console.error('Batch fetch error:', e);
        }
    }

    // 若有抓到資料則渲染，否則進入 Fallback
    if (combinedData.length > 0) {
        let html = await fetchTWIndex();
        for (const sym of TW_STOCKS) {
            const item = combinedData.find(m => m.c === sym);
            if (!item) {
                html += buildRow(sym, '無行情', '--', 0, '<span class="tag-neut">--</span>', '', 'var(--tw-blue)');
                continue;
            }
            const price = parseFloat(item.z || item.y) || 0;
            const prevDay = parseFloat(item.y) || price;
            const change = prevDay > 0 ? ((price - prevDay) / prevDay * 100) : 0;
            const vol = parseInt(item.v) || 0;
            const avgVol = parseInt(item.q) || vol;
            const {mainTag, sigHtml} = calcSignal(sym, change, avgVol > 0 ? vol / avgVol : 1);
            html += buildRow(sym, item.n || sym, price.toFixed(1), change, mainTag, sigHtml, 'var(--tw-blue)');
        }
        container.innerHTML = html;
    } else {
        container.innerHTML = await fetchTWFallback() + await fetchTWIndex();
    }
    updateTSMPremium();
}

// ... [其餘排程保持不變，建議 fetchTWStocks 間隔調大至 45-60秒] ...
</script>
</body>
</html>
