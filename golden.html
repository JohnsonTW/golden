<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JPM Command Center v31.6 (WS Real-Time)</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #06090d;
            --card-bg: #0d1117;
            --text-title: #ffffff;
            --text-sub: #8b949e;
            --color-up: #23c55e;
            --color-down: #f84444;
            --border-color: #21262d;
            --jpm-gold: #d4af37;
        }
        body {
            background-color: var(--bg-color); color: var(--text-title);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: calc(10px + env(safe-area-inset-top)) 12px 100px 12px;
            -webkit-user-select: none; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; position: relative; }
        .jpm-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); }
        .jpm-title { font-size: 19px; font-weight: 800; margin: 2px 0; color: #f1f5f9; }
        
        .heartbeat-status { position: absolute; top: 12px; right: 8px; font-size: 11px; color: var(--color-up); font-weight: bold; display: flex; align-items: center; gap: 4px; }

        .synergy-alert-bar { display: none; background: #7f1d1d; border: 2px solid #ef4444; color: #fee2e2; border-radius: 6px; padding: 12px; margin-bottom: 10px; font-weight: 800; font-size: 14px; text-align: center; animation: danger-flash 0.5s infinite alternate; box-shadow: 0 0 15px rgba(239,68,68,0.5); }
        .synergy-details { font-size: 11px; font-weight: bold; color: #fca5a5; margin-top: 4px; font-family: monospace; }

        .jpm-macro-panel { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        .panel-row { display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-weight: bold; color: var(--jpm-gold); }
        .panel-value { font-family: monospace; font-size: 14px; font-weight: bold; }

        .jpm-conclusion { margin-bottom: 10px; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; text-align: center; background: #22272e; color: #cbd5e1; }

        .asset-list { display: flex; flex-direction: column; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 10px; }
        .asset-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #21262d; }
        .asset-row:last-child { border-bottom: none; }
        
        .col-left { width: 130px; display: flex; flex-direction: column; }
        .col-center { width: 125px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .col-right { width: 115px; text-align: right; display: flex; flex-direction: column; }
        
        .state-label-box { font-size: 14px; font-weight: bold; font-family: monospace; color: var(--text-sub); text-align: center; width: 100%; }
        .tag-whale { background: rgba(35, 197, 94, 0.15); color: #34d399; padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(35, 197, 94, 0.3); font-size: 13px; } 
        .tag-dump { background: rgba(248, 68, 68, 0.15); color: #fee2e2; padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(248, 68, 68, 0.3); font-size: 13px; }
        .tag-pin { background: rgba(212, 175, 55, 0.15); color: var(--jpm-gold); padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); font-size: 13px; }

        .asset-chg { font-size: 12.5px; font-weight: bold; font-family: monospace; margin-top: 2px; }
        @keyframes danger-flash { from { background: #560f0f; border-color: #ef4444; } to { background: #991b1b; border-color: #f87171; } }
    </style>
</head>
<body>

<div class="container">
    <div class="jpm-header">
        <div class="jpm-brand">🏛️ J.P. Morgan ACC Web Terminal v31.6</div>
        <div class="jpm-title">全球跨市場即時量化矩陣</div>
        <div id="jpm-status-indicator" class="heartbeat-status" style="color:var(--color-down)">○ DISCONNECTED</div>
    </div>

    <div id="synergy-alert" class="synergy-alert-bar">
        🏛️ <span id="synergy-title">SYSTEM</span> REAL-TIME WEBSOCKET SYNERGY
        <div id="synergy-metrics" class="synergy-details"></div>
    </div>

    <div class="jpm-macro-panel">
        <div class="panel-row">
            <span class="panel-title">📡 數據管道模式</span>
            <span class="panel-value" style="color:var(--jpm-gold)">Binance Official WebSocket (秒級)</span>
        </div>
        <div class="panel-row" style="margin-top:4px; border-top:1px solid rgba(255,255,255,0.05); padding-top:4px;">
            <span class="panel-title">⚡ 流速健康度斷言</span>
            <span id="global-liq-text" class="panel-value" style="color:var(--text-sub)">正在與馬爾他機房建立握手...</span>
        </div>
    </div>

    <div id="jpm-decision" class="jpm-conclusion">JPM ENGINE: STREAMING REAL-TIME DATA</div>

    <div class="group-title">🪙 CRYPTO PERPETUALS (零延遲即時流速監測)</div>
    <div id="crypto-container" class="asset-list">
        <div id="row-BTCUSDT" class="asset-row"></div>
        <div id="row-ETHUSDT" class="asset-row"></div>
        <div id="row-SOLUSDT" class="asset-row"></div>
    </div>
</div>

<script>
    if (!localStorage.getItem('web_v316_flush')) { localStorage.clear(); localStorage.setItem('web_v316_flush', 'true'); }

    let ws;
    // 🧠 鎖定三個最具備機構流動性參考價值的核心永續合約
    const ASSETS = {
        "btcusdt": { symbol: "BTC", price: 0, change: 0, high: 0, low: 0 },
        "ethusdt": { symbol: "ETH", price: 0, change: 0, high: 0, low: 0 },
        "solusdt": { symbol: "SOL", price: 0, change: 0, high: 0, low: 0 }
    };

    let latchExpiryTime = 0;
    let latchedAsset = "";
    let latchedChg = 0;

    function initWebSocket() {
        // 📡 直連幣安永續合約官方實時全盤串流（Aggregated Ticker Stream）
        const streamUrl = "wss://fstream.binance.com/ws/btcusdt@ticker/ethusdt@ticker/solusdt@ticker";
        
        ws = new WebSocket(streamUrl);

        ws.onopen = () => {
            document.getElementById('jpm-status-indicator').innerText = "● WS LIVE";
            document.getElementById('jpm-status-indicator').style.color = "var(--color-up)";
            document.getElementById('global-liq-text').innerText = "🟢 數據管道已咬死盤口，零延遲監聽中";
            document.getElementById('global-liq-text').style.color = "var(--color-up)";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const streamName = data.s.toLowerCase(); // 例如 "ethusdt"
            
            if (ASSETS[streamName]) {
                // 📝 幣安官方 Websocket 欄位解碼扣抵
                ASSETS[streamName].price = parseFloat(data.c);      // c = 當前最新成交價 (Last Price)
                ASSETS[streamName].change = parseFloat(data.P);     // P = 24h 價格漲跌幅百分比 (Price Change Percent)
                ASSETS[streamName].high = parseFloat(data.h);       // h = 24h 最高價
                ASSETS[streamName].low = parseFloat(data.l);        // l = 24h 最低價
                
                renderAssetRow(streamName);
                checkSynergyLogic();
            }
        };

        ws.onclose = () => {
            document.getElementById('jpm-status-indicator').innerText = "⚠️ WS LOST";
            document.getElementById('jpm-status-indicator').style.color = "var(--color-down)";
            document.getElementById('global-liq-text').innerText = "🔴 連線中斷，3秒後後端硬核自動重連...";
            document.getElementById('global-liq-text').style.color = "var(--color-down)";
            setTimeout(initWebSocket, 3000); // 💥 自動斷線重連機制（Failover）
        };

        ws.onerror = () => { ws.close(); };
    }

    function renderAssetRow(key) {
        const item = ASSETS[key];
        const rowEl = document.getElementById(`row-${key.toUpperCase()}`);
        if (!rowEl) return;

        let centerContentHtml = "---";
        // 🔬 基於即時流速震幅的純淨實盤硬斷言（無任何編造數據）
        let amplitude = item.low > 0 ? ((item.high - item.low) / item.low) * 100 : 0;

        if (item.change > 3.5) {
            centerContentHtml = `<span class="tag-whale">🟩 巨鯨吸籌</span>`;
        } else if (item.change < -4.5) {
            centerContentHtml = `<span class="tag-dump">🟥 機構出貨</span>`;
        } else if (amplitude > 5.0 && item.change < -0.1) {
            // 🎯 真實世界條件：只有當該幣當天發生劇烈大洗盤（震幅突破5%）且目前價格被打壓時，才觸發插針標籤
            centerContentHtml = `<span class="tag-pin">🟧 插針反彈</span>`;
        }

        rowEl.innerHTML = `
            <div class="col-left"><span style="font-size: 18px !important; font-weight: bold;">${item.symbol}</span></div>
            <div class="col-center"><div class="state-label-box">${centerContentHtml}</div></div>
            <div class="col-right">
                <span style="font-size: 18px !important; font-weight: bold; font-family: monospace;">$${item.price.toLocaleString(undefined, {maximumFractionDigits:2})}</span>
                <span class="asset-chg" style="color:${item.change>=0?'var(--color-up)':'var(--color-down)'}">${item.change>=0?'+':''}${item.change.toFixed(2)}%</span>
            </div>
        `;
    }

    function checkSynergyLogic() {
        const now = Date.now();
        
        // 🎯 100% 實盤共振硬條件：
        // 當 ETH 當天振幅大於 5.5% (代表大洗盤發生)，且在當前秒級流速中，BTC 同步出現恐慌砸盤 (24h跌幅超2%)
        // 這代表跨市場空頭踩踏共振正在發生！
        let ethAmp = (ASSETS["ethusdt"].high - ASSETS["ethusdt"].low) / ASSETS["ethusdt"].low * 100;
        let btcChg = ASSETS["btcusdt"].change;

        if (ethAmp > 5.5 && btcChg < -2.0) {
            latchExpiryTime = now + 15000;
            latchedAsset = "ETH/BTC CORE";
            latchedChg = btcChg;
        }

        const synergyAlert = document.getElementById('synergy-alert');
        if (now < latchExpiryTime) {
            synergyAlert.style.display = "block";
            let timeLeft = Math.ceil((latchExpiryTime - now) / 1000);
            document.getElementById('synergy-title').innerText = `${latchedAsset} CO-RESONANCE`;
            document.getElementById('synergy-metrics').innerText = `🚨 CRITERIA MET: MARKET CASCADE DETECTED | BTC CHG: ${latchedChg.toFixed(2)}% | SL: NEEDLE TIP | LOCK: ${timeLeft}s`;
        } else {
            synergyAlert.style.display = "none";
        }
    }

    // 📱 手機後台切換防凍結：只要回到網頁，強制斷開舊 WS 並秒速重連，確保數據百分之百新鮮！
    document.addEventListener("visibilitychange", function() {
        if (!document.hidden) {
            latchExpiryTime = 0;
            document.getElementById('synergy-alert').style.display = "none";
            if (ws) { ws.close(); }
        }
    });

    // 🚀 啟動引擎
    initWebSocket();
</script>
</body>
</html>
