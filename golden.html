<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JPM Command Center v38.5</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg-color: #06090d; --card-bg: #0d1117; --text-title: #ffffff; --text-sub: #8b949e; --color-up: #23c55e; --color-down: #f84444; --border-color: #21262d; --jpm-gold: #d4af37; --tw-blue: #38bdf8; }
        body { background-color: var(--bg-color); color: var(--text-title); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: calc(10px + env(safe-area-inset-top)) 12px 100px 12px; -webkit-user-select: none; box-sizing: border-box; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .jpm-title { font-size: 19px; font-weight: 800; color: #f1f5f9; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid var(--border-color); display: flex; padding: 10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index: 1000; }
        .nav-item { color: var(--text-sub); flex: 1; display: flex; flex-direction: column; align-items: center; background: none; border: none; font-size: 10px; }
        .nav-item.active { color: var(--jpm-gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .asset-list { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 10px; margin-bottom: 10px; }
        .asset-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #21262d; }
        .group-title { font-size: 12px; font-weight: bold; color: var(--text-sub); margin: 15px 0 5px 2px; }
        .liq-bar-container { height: 8px; background: #21262d; border-radius: 4px; display: flex; margin: 5px 0; }
        .config-input { width: 100%; background: #161b22; border: 1px solid var(--border-color); color: white; padding: 8px; margin-top: 5px; }
        .chip { display: inline-block; background: #21262d; padding: 5px 10px; margin: 3px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="jpm-header"><div class="jpm-title">🔥 JPM QUANT MATRIX v38.5</div></div>

    <div id="tab-crypto" class="tab-content active">
        <div class="group-title">🪙 實盤報價</div>
        <div id="crypto-container" class="asset-list"></div>
    </div>

    <div id="tab-liq" class="tab-content">
        <div class="group-title">💥 全網爆倉累計</div>
        <div id="liq-container"></div>
    </div>

    <div id="tab-whale" class="tab-content">
        <div class="group-title">🐳 獨立分軌監控 ($50k+ 機構單)</div>
        <div id="whale-container"></div>
    </div>

    <div id="tab-stocks" class="tab-content">
        <div class="group-title">📈 股市行情 (前日收盤)</div>
        <div id="stock-container" class="asset-list"></div>
    </div>

    <div id="tab-config" class="tab-content">
        <div class="asset-list">
            <div class="group-title">新增監控 (例: BTCUSDT)</div>
            <input type="text" id="crypto-custom" class="config-input">
            <button onclick="addAsset('crypto')">新增幣種</button>
            <div id="crypto-chips"></div>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('crypto')">🪙 報價</button>
    <button class="nav-item" onclick="switchTab('liq')">💥 爆倉</button>
    <button class="nav-item" onclick="switchTab('whale')">🐳 巨鯨</button>
    <button class="nav-item" onclick="switchTab('stocks')">📈 股市</button>
    <button class="nav-item" onclick="switchTab('config')">⚙️ 設置</button>
</nav>

<script>
    let CRYPTOS = JSON.parse(localStorage.getItem('cfg_cryptos')) || ["BTCUSDT", "ETHUSDT"];
    let TW_STOCK_MAP = {"2330": "台積電", "2454": "聯發科"};
    
    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
    }

    // WebSocket 巨鯨監控
    let whaleWs;
    function connectWhaleStream() {
        if(whaleWs) whaleWs.close();
        let streams = CRYPTOS.map(c => c.toLowerCase() + '@aggTrade').join('/');
        whaleWs = new WebSocket(`wss://fstream.binance.com/stream?streams=${streams}`);
        whaleWs.onmessage = (e) => {
            let d = JSON.parse(e.data).data;
            let val = parseFloat(d.p) * parseFloat(d.q);
            if(val >= 50000) {
                let sym = d.s.replace('USDT','');
                let el = document.getElementById(`whale-track-${sym}`);
                if(el) {
                    el.insertAdjacentHTML('afterbegin', `<div style="font-size:11px; color:${d.m ? 'var(--color-down)' : 'var(--color-up)'}">${d.m?'🔴砸':'🟢掃'} $${(val/1000).toFixed(0)}K @${d.p}</div>`);
                }
            }
        };
    }

    function initWhaleTrackers() {
        let container = document.getElementById('whale-container');
        container.innerHTML = CRYPTOS.map(s => {
            let sym = s.replace("USDT","");
            return `<div class="group-title">${sym}</div><div id="whale-track-${sym}" class="asset-list">等待大單...</div>`;
        }).join('');
    }

    function addAsset(t) {
        let v = document.getElementById('crypto-custom').value.toUpperCase();
        if(!v.endsWith("USDT")) v += "USDT";
        CRYPTOS.push(v); localStorage.setItem('cfg_cryptos', JSON.stringify(CRYPTOS));
        initWhaleTrackers(); connectWhaleStream();
    }

    initWhaleTrackers(); connectWhaleStream();
</script>
</body>
</html>
