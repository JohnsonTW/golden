    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg-color: #06090d; --card-bg: #0d1117; --text-title: #ffffff; --text-sub: #8b949e;
            --color-up: #23c55e; --color-down: #f84444; --border-color: #21262d; --jpm-gold: #d4af37; --tw-blue: #38bdf8;
        }
        body {
            background-color: var(--bg-color); color: var(--text-title);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: calc(10px + env(safe-area-inset-top)) 12px 100px 12px;
            -webkit-user-select: none; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; position: relative; }
        .jpm-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); }
        .jpm-title { font-size: 19px; font-weight: 800; margin: 2px 0; color: #f1f5f9; }
        .heartbeat-status { position: absolute; top: 12px; right: 8px; font-size: 11px; color: var(--color-up); font-weight: bold; }

        .jpm-macro-panel { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        .panel-row { display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-weight: bold; color: var(--jpm-gold); }
        .panel-value { font-family: monospace; font-size: 14px; font-weight: bold; }

        .jpm-conclusion { margin-bottom: 10px; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; text-align: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); background: #22272e; color: #cbd5e1; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index: 1000; box-sizing: border-box; }
        .nav-item { color: var(--text-sub); font-size: 10.5px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; flex: 1; text-align: center; padding: 0; margin: 0; }
        .nav-item.active { color: var(--jpm-gold); }
        .nav-icon { font-size: 17px; display: block; }

        .group-title { font-size: 12px; font-weight: bold; color: var(--text-sub); margin: 14px 0 6px 2px; }
        .asset-list { display: flex; flex-direction: column; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 10px; }
        
        .asset-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #21262d; min-height: 56px; box-sizing: border-box; }
        .asset-row:last-child { border-bottom: none; }
        
        .col-left { width: 130px; display: flex; flex-direction: column; text-align: left; }
        .col-center { width: 125px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .col-right { width: 115px; text-align: right; display: flex; flex-direction: column; }
        
        .state-label-box { font-size: 13px; font-weight: bold; font-family: monospace; text-align: center; width: 100%; }
        .tag-whale { background: rgba(35, 197, 94, 0.15); color: #34d399; padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(35, 197, 94, 0.3); font-size: 13px; } 
        .tag-dump { background: rgba(248, 68, 68, 0.15); color: #fee2e2; padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(248, 68, 68, 0.3); font-size: 13px; }
        .tag-pin { background: rgba(212, 175, 55, 0.15); color: var(--jpm-gold); padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); font-size: 13px; }
