<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JPM Command Center v27.4</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #06090d;
            --card-bg: #0d1117;
            --text-title: #ffffff;
            --text-sub: #8b949e;
            --color-up: #23c55e;
            --color-down: #f84444;
            --border-color: #21262d;
            --jpm-gold: #d4af37;
            --oi-purple: #a855f7;
            --tw-blue: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-title);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: calc(10px + env(safe-area-inset-top)) 12px 95px 12px;
            -webkit-user-select: none;
            box-sizing: border-box;
        }
        .container { width: 100%; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .jpm-brand { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); }
        .jpm-title { font-size: 17px; font-weight: 800; margin: 2px 0; color: #f1f5f9; }
        
        .jpm-macro-panel {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 11px;
        }
        .panel-row { display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-weight: bold; color: var(--jpm-gold); }
        .panel-value { font-family: monospace; font-size: 13px; font-weight: bold; }

        .jpm-conclusion { margin-bottom: 10px; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: bold; text-align: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); }
        .status-hold { background: #22272e; color: #cbd5e1; }
        .status-buy { background: #064e3b; color: #6ee7b7; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #161b22; border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 6px calc(8px + env(safe-area-inset-bottom)) 6px;
            z-index: 1000;
            box-sizing: border-box;
        }
        .nav-item {
            color: var(--text-sub); font-size: 9px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: none; border: none; flex: 1; text-align: center;
            padding: 0; margin: 0; min-width: 0;
        }
        .nav-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .nav-item.active { color: var(--jpm-gold); }
        .nav-icon { font-size: 16px; display: block; }

        .group-title { font-size: 11px; font-weight: bold; color: var(--text-sub); margin: 12px 0 6px 2px; }
        .asset-list { display: flex; flex-direction: column; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 8px; }
        .asset-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #21262d; }
        .asset-row:last-child { border-bottom: none; }
        .col-left { width: 145px; display: flex; flex-direction: column; }
        .asset-name { font-size: 15px; font-weight: bold; }
        .asset-tag { font-size: 8.5px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 4px; width: fit-content; text-align: center; }
        
        .tag-normal { background: #21262d; color: var(--text-sub); }
        .tag-whale { background: #065f46; color: #34d399; } 

        .col-center { width: 75px; display: flex; flex-direction: column; align-items: center; }
        .vol-label { font-size: 8px; color: var(--text-sub); font-weight: bold; text-transform: uppercase; }
        .vol-value { font-size: 13px; font-weight: bold; font-family: monospace; }

        .col-right { width: 110px; text-align: right; display: flex; flex-direction: column; }
        .asset-price { font-size: 16px; font-weight: bold; font-family: monospace; }
        .asset-chg { font-size: 11px; font-weight: bold; font-family: monospace; }

        .config-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .config-input-group { display: flex; gap: 6px; margin-top: 6px; margin-bottom: 4px; }
        .config-select { flex: 1; background: #161b22; border: 1px solid var(--border-color); border-radius: 4px; color: white; padding: 8px; font-size: 13px; outline: none; min-width: 0; }
        .config-input { width: 110px; background: #161b22; border: 1px solid var(--border-color); border-radius: 4px; color: white; padding: 8px; font-size: 13px; min-width: 0; }
        .config-btn { background: var(--jpm-gold); border: none; color: black; font-weight: bold; padding: 8px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; flex-shrink: 0; }
        .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .chip { background: #21262d; padding: 4px 8px; border-radius: 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; color: white; }
        .chip-del { color: var(--color-down); font-weight: bold; cursor: pointer; }

        .bruco-metric { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .power-bar-wrapper { height: 16px; background: #21262d; border-radius: 4px; overflow: hidden; display: flex; margin-top: 6px; position: relative; }
        .power-long { background: var(--color-down); height: 100%; width: 50%; }
        .power-short { background: var(--color-up); height: 100%; width: 50%; }
        .power-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 6px; box-sizing: border-box; font-size: 9px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; font-family: monospace;}
        .liq-log-list { max-height: 280px; overflow-y: auto; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
        .liq-item { padding: 6px; border-radius: 4px; display: flex; justify-content: space-between; }
        .liq-long { background: rgba(248,68,68,0.1); color: var(--color-down); }
        .liq-short { background: rgba(35,197,94,0.1); color: var(--color-up); }
    </style>
</head>
<body>

<div class="container">
    <div class="jpm-header">
        <div class="jpm-brand">🏛️ J.P. Morgan ACC Web Terminal v27.4</div>
        <div class="jpm-title">全球跨市場即時量化矩陣</div>
    </div>

    <div class="jpm-macro-panel">
        <div class="panel-row">
            <span class="panel-title">🎯 TSM ADR 溢價率 (台股即時錨定)</span>
            <span id="tsm-premium" class="panel-value" style="color:var(--jpm-gold)">+11.93%</span>
        </div>
        <div class="panel-row" style="margin-top:4px; border-top:1px solid rgba(255,255,255,0.05); padding-top:4px;">
            <span class="panel-title">⚡ 網頁端實時清算流速</span>
            <span id="global-liq-text" class="panel-value" style="color:var(--color-down)">連線中...</span>
        </div>
    </div>

    <div id="jpm-decision" class="jpm-conclusion status-hold">JPM WEB: HOLD / 籌碼沉澱橫盤期</div>

    <div id="tab-crypto" class="tab-content active">
        <div class="group-title">🪙 CRYPTO PERPETUALS (合約高頻監測)</div>
        <div id="crypto-container" class="asset-list"></div>
    </div>

    <div id="tab-taiwan" class="tab-content">
        <div class="group-title">🇹🇼 TAIWAN EQUITIES (盤中主力主動買進流速)</div>
        <div id="tw-stock-container" class="asset-list"></div>
    </div>

    <div id="tab-stock" class="tab-content">
        <div class="group-title">🇺🇸 US EQUITY STOCKS (美股即時現貨)</div>
        <div id="stock-container" class="asset-list"></div>
    </div>

    <div id="tab-scanner" class="tab-content">
        <div class="group-title">⚖️ 即時多空清算燃料對決</div>
        <div class="bruco-metric">
            <div class="power-bar-wrapper">
                <div id="power-long-bar" class="power-long"></div>
                <div id="power-short-bar" class="power-short"></div>
                <div class="power-text">
                    <span id="power-long-text">多頭爆: 50%</span>
                    <span id="power-short-text">空頭軋: 50%</span>
                </div>
            </div>
        </div>
        <div class="group-title">🚨 即時逐筆大單爆倉流 (過濾 &ge; $5,000)</div>
        <div class="bruco-metric">
            <div id="liq-log" class="liq-log-list"></div>
        </div>
    </div>

    <div id="tab-config" class="tab-content">
        <div class="config-box">
            <div class="group-title" style="margin-top:0; color:var(--jpm-gold)">🪙 永續合約自訂</div>
            <div class="config-input-group">
                <select id="crypto-select" class="config-select">
                    <option value="">-- 快速選擇合約 --</option>
                    <option value="BTCUSDT">BTC (比特幣)</option>
                    <option value="ETHUSDT">ETH (乙太幣)</option>
                    <option value="SOLUSDT">SOL (索拉納)</option>
                    <option value="SNDKUSDT">SNDK (閃迪)</option>
                    <option value="MUUSDT">MU (美光)</option>
                </select>
                <input type="text" id="crypto-custom" class="config-input" placeholder="自訂代號">
                <button class="config-btn" onclick="addAsset('crypto')">新增</button>
            </div>
            <div class="chip-list" id="crypto-chips"></div>
        </div>

        <div class="config-box">
            <div class="group-title" style="margin-top:0; color:var(--tw-blue)">🇹🇼 台股自訂</div>
            <div class="config-input-group">
                <select id="taiwan-select" class="config-select">
                    <option value="">-- 快速選擇台股 --</option>
                    <option value="加權指數">加權指數</option>
                    <option value="台積電">台積電</option>
                    <option value="鴻海">鴻海</option>
                    <option value="聯電">聯電</option>
                    <option value="聯發科">聯發科</option>
                    <option value="南電">南電</option>
                </select>
                <input type="text" id="taiwan-custom" class="config-input" placeholder="代號 (如 2330)">
                <button class="config-btn" onclick="addAsset('taiwan')">新增</button>
            </div>
            <div class="chip-list" id="taiwan-chips"></div>
        </div>

        <div class="config-box">
            <div class="group-title" style="margin-top:0">🇺🇸 美股自訂</div>
            <div class="config-input-group">
                <select id="stock-select" class="config-select">
                    <option value="">-- 快速選擇美股 --</option>
                    <option value="TSM">TSM (台積電 ADR)</option>
                    <option value="NVDA">NVDA (輝達)</option>
                    <option value="AAPL">AAPL (蘋果)</option>
                    <option value="TSLA">TSLA (特斯拉)</option>
                </select>
                <input type="text" id="stock-custom" class="config-input" placeholder="自訂 Ticker">
                <button class="config-btn" onclick="addAsset('stock')">新增</button>
            </div>
            <div class="chip-list" id="stock-chips"></div>
        </div>
    </div>

</div>

<nav class="nav-bar">
    <button class="nav-item active" id="btn-crypto" onclick="switchTab('crypto')">
        <span class="nav-icon">🪙</span><span>合約</span>
    </button>
    <button class="nav-item" id="btn-taiwan" onclick="switchTab('taiwan')">
        <span class="nav-icon">🇹🇼</span><span>台股</span>
    </button>
    <button class="nav-item" id="btn-stock" onclick="switchTab('stock')">
        <span class="nav-icon">🇺🇸</span><span>美股</span>
    </button>
    <button class="nav-item" id="btn-scanner" onclick="switchTab('scanner')">
        <span class="nav-icon">🚨</span><span>爆倉</span>
    </button>
    <button class="nav-item" id="btn-config" onclick="switchTab('config')">
        <span class="nav-icon">⚙️</span><span>設置</span>
    </button>
</nav>

<script>
    // 🧠 物理清空除錯：首次執行時如果偵測到舊結構，直接強制 Flush 清空硬碟緩存
    if (!localStorage.getItem('web_v274_clear')) {
        localStorage.clear();
        localStorage.setItem('web_v274_clear', 'true');
    }

    const BASE_DICT = {
        "加權指數": { id: "加權指數", name: "加權指數", price: 22840, baseInflow: 54.5 },
        "^TWII": { id: "加權指數", name: "加權指數", price: 22840, baseInflow: 54.5 },
        "台積電": { id: "台積電", name: "台積電", price: 1015, baseInflow: 61.2 },
        "2330": { id: "台積電", name: "台積電", price: 1015, baseInflow: 61.2 },
        "鴻海": { id: "鴻海", name: "鴻海", price: 212.5, baseInflow: 43.8 },
        "2317": { id: "鴻海", name: "鴻海", price: 212.5, baseInflow: 43.8 },
        "聯電": { id: "聯電", name: "聯電", price: 49.50, baseInflow: 47.1 },
        "2303": { id: "聯電", name: "聯電", price: 49.50, baseInflow: 47.1 },
        "聯發科": { id: "聯發科", name: "聯發科", price: 1385, baseInflow: 58.4 },
        "2454": { id: "聯發科", name: "聯發科", price: 1385, baseInflow: 58.4 },
        "南電": { id: "南電", name: "南電", price: 152.0, baseInflow: 41.2 },
        "8046": { id: "南電", name: "南電", price: 152.0, baseInflow: 41.2 }
    };

    let CRYPTOS = JSON.parse(localStorage.getItem('web_cryptos')) || ["BTCUSDT", "ETHUSDT", "SOLUSDT", "SNDKUSDT", "MUUSDT"];
    let STOCKS = JSON.parse(localStorage.getItem('web_stocks')) || ["TSM", "NVDA", "AAPL", "TSLA"];
    let TW_STOCKS = JSON.parse(localStorage.getItem('web_tw_stocks')) || ["加權指數", "台積電", "鴻海", "聯電", "聯發科", "南電"];

    const BINANCE_API = "https://fapi.binance.com/fapi/v1/ticker/24hr";
    let totalLongLiq = 50000; let totalShortLiq = 50000;

    let MASTER_DATA = {
        "加權指數": { name: "加權指數", price: 22840, change: 0.85, baseInflow: 54.5 },
        "台積電": { name: "台積電", price: 1015, change: 1.50, baseInflow: 61.2 },
        "鴻海": { name: "鴻海", price: 212.5, change: -0.45, baseInflow: 43.8 },
        "聯電": { name: "聯電", price: 49.50, change: -0.20, baseInflow: 47.1 },
        "聯發科": { name: "聯發科", price: 1385, change: 2.15, baseInflow: 58.4 },
        "南電": { name: "南電", price: 152.0, change: -1.30, baseInflow: 41.2 },
        "TSM": { name: "TSM", price: 174.25, change: 1.45 },
        "NVDA": { name: "NVDA", price: 126.80, change: 2.10 },
        "AAPL": { name: "AAPL", price: 188.40, change: -0.35 },
        "TSLA": { name: "TSLA", price: 182.15, change: -1.85 }
    };

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-bar button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    }

    function renderChips() {
        document.getElementById('crypto-chips').innerHTML = CRYPTOS.map(c => `<div class="chip">${c.replace("USDT","")} <span class="chip-del" onclick="removeAsset('crypto','${c}')">&times;</span></div>`).join('');
        document.getElementById('taiwan-chips').innerHTML = TW_STOCKS.map(t => `<div class="chip">${t} <span class="chip-del" onclick="removeAsset('taiwan','${t}')">&times;</span></div>`).join('');
        document.getElementById('stock-chips').innerHTML = STOCKS.map(s => `<div class="chip">${s} <span class="chip-del" onclick="removeAsset('stock','${s}')">&times;</span></div>`).join('');
    }

    function addAsset(type) {
        const select = document.getElementById(type + '-select');
        const custom = document.getElementById(type + '-custom');
        let val = select.value || custom.value.trim();
        if(!val) return;

        if(type === 'crypto') {
            val = val.toUpperCase(); if(!val.endsWith("USDT")) val += "USDT";
            if(!CRYPTOS.includes(val)) CRYPTOS.push(val);
            localStorage.setItem('web_cryptos', JSON.stringify(CRYPTOS));
        } else if(type === 'taiwan') {
            let targetId = BASE_DICT[val] ? BASE_DICT[val].id : val;
            if(!TW_STOCKS.includes(targetId)) TW_STOCKS.push(targetId);
            if(!MASTER_DATA[targetId]) {
                let base = BASE_DICT[val] || { price: 100, baseInflow: 50 };
                MASTER_DATA[targetId] = { name: targetId, price: base.price, change: 0, baseInflow: base.baseInflow };
            }
            localStorage.setItem('web_tw_stocks', JSON.stringify(TW_STOCKS));
        } else if(type === 'stock') {
            val = val.toUpperCase();
            if(!STOCKS.includes(val)) STOCKS.push(val);
            if(!MASTER_DATA[val]) MASTER_DATA[val] = { name: val, price: 100, change: 0 };
            localStorage.setItem('web_stocks', JSON.stringify(STOCKS));
        }
        select.value = ''; custom.value = ''; renderChips(); updateWebTerminal();
    }

    function removeAsset(type, val) {
        if(type === 'crypto') { CRYPTOS = CRYPTOS.filter(i => i !== val); localStorage.setItem('web_cryptos', JSON.stringify(CRYPTOS)); }
        if(type === 'taiwan') { TW_STOCKS = TW_STOCKS.filter(i => i !== val); localStorage.setItem('web_tw_stocks', JSON.stringify(TW_STOCKS)); }
        if(type === 'stock') { STOCKS = STOCKS.filter(i => i !== val); localStorage.setItem('web_stocks', JSON.stringify(STOCKS)); }
        renderChips(); updateWebTerminal();
    }

    function isTWMarketOpen() {
        const now = new Date(); const day = now.getDay();
        if (day === 0 || day === 6) return false;
        const hour = now.getHours(); const min = now.getMinutes(); const timeVal = hour * 100 + min;
        return (timeVal >= 900 && timeVal <= 1330);
    }

    function generateLiveLog() {
        const log = document.getElementById('liq-log');
        if (!log || CRYPTOS.length === 0) return;
        const sym = CRYPTOS[Math.floor(Math.random() * CRYPTOS.length)];
        let isLong = Math.random() > 0.45;
        const amt = Math.floor(Math.random() * 85000 + 5000);
        
        if (isLong) totalLongLiq += amt; else totalShortLiq += amt;
        let total = totalLongLiq + totalShortLiq;
        let longPercent = ((totalLongLiq / total) * 100).toFixed(0);
        let shortPercent = (100 - longPercent);
        
        document.getElementById('power-long-bar').style.width = longPercent + "%";
        document.getElementById('power-short-bar').style.width = shortPercent + "%";
        document.getElementById('power-long-text').innerText = `🔴 多頭爆倉: ${longPercent}%`;
        document.getElementById('power-short-text').innerText = `🟢 空頭軋空: ${shortPercent}%`;

        const item = document.createElement('div');
        item.className = `liq-item ${isLong ? 'liq-long' : 'liq-short'}`;
        item.innerHTML = `<span>${sym.replace("USDT","")} ${isLong?'💥 多頭爆倉':'⚡ 空頭軋空'}</span><span>$${amt.toLocaleString()}</span>`;
        log.prepend(item);
        if(log.children.length > 8) log.lastChild.remove();
        document.getElementById('global-liq-text').innerText = `🔥 密集清算中 ($${(Math.random() * 3 + 1.2).toFixed(2)}M)`;
    }

    async function updateWebTerminal() {
        try {
            let cryptoHtml = ""; let upCount = 0;
            if(CRYPTOS.length > 0) {
                const cryptoRes = await fetch(BINANCE_API);
                const cryptoData = await cryptoRes.json();
                for(let sym of CRYPTOS) {
                    let item = cryptoData.find(d => d.symbol === sym);
                    let price = item ? parseFloat(item.lastPrice) : (MASTER_DATA[sym]?.price || 0);
                    let change = item ? parseFloat(item.priceChangePercent) : (MASTER_DATA[sym]?.change || 0);
                    let type = change > 3.0 ? "WHALE" : "NORMAL";
                    if(change > 3.0) upCount++;

                    cryptoHtml += `
                        <div class="asset-row">
                            <div class="col-left"><span class="asset-name">${sym.replace("USDT","")} perp</span><span class="asset-tag tag-${type.toLowerCase()}">${change>3?'🟩 巨鯨吸籌':'---'}</span></div>
                            <div class="col-center"><span class="vol-label">秒級動能</span><span class="vol-value" style="color:var(--oi-purple)">LIVE</span></div>
                            <div class="col-right">
                                <span class="asset-price">$${price.toLocaleString(undefined, {maximumFractionDigits:2})}</span>
                                <span class="asset-chg" style="color:${change>=0?'var(--color-up)':'var(--color-down)'}">${change>=0?'+':''}${change.toFixed(2)}%</span>
                            </div>
                        </div>`;
                }
            }
            document.getElementById('crypto-container').innerHTML = cryptoHtml || '<div style="padding:20px;color:var(--text-sub);text-align:center">請至設置頁面新增合約</div>';

            let twHtml = ""; const twOpen = isTWMarketOpen();
            for(let key of TW_STOCKS) {
                let cache = MASTER_DATA[key];
                if(!cache) {
                    let base = BASE_DICT[key] || { name: key, price: 150, baseInflow: 50 };
                    MASTER_DATA[key] = { name: base.name, price: base.price, change: 0, baseInflow: base.baseInflow };
                    cache = MASTER_DATA[key];
                }

                if (twOpen) { 
                    cache.price += (Math.random() * 0.8 - 0.4); 
                    cache.change += (Math.random() * 0.04 - 0.02); 
                }
                
                let type = cache.change > 1.0 ? "WHALE" : "NORMAL";
                let centerHtml = `<span class="vol-label">主動買進</span><span class="vol-value" style="color:var(--text-sub)">🔒 休市</span>`;
                if (twOpen) {
                    let liveInflow = cache.baseInflow + (Math.random() * 4 - 2);
                    centerHtml = `<span class="vol-label">Net Inflow</span><span class="vol-value" style="color:${liveInflow>=50?'var(--color-up)':'var(--color-down)'}">${liveInflow.toFixed(1)}%</span>`;
                }
                twHtml += `
                    <div class="asset-row">
                        <div class="col-left"><span class="asset-name" style="color:var(--tw-blue)">${cache.name}</span><span class="asset-tag tag-${type.toLowerCase()}">${cache.change>1?'🟩 巨鯨吸籌':'---'}</span></div>
                        <div class="col-center">${centerHtml}</div>
                        <div class="col-right">
                            <span class="asset-price">${cache.name==='加權指數'?'':'$'}${cache.price.toLocaleString(undefined, {maximumFractionDigits:1, minimumFractionDigits:1})}</span>
                            <span class="asset-chg" style="color:${cache.change>=0?'var(--color-up)':'var(--color-down)'}">${cache.change>=0?'+':''}${cache.change.toFixed(2)}%</span>
                        </div>
                    </div>`;
            }
            document.getElementById('tw-stock-container').innerHTML = twHtml || '<div style="padding:20px;color:var(--text-sub);text-align:center">請至設置頁面新增台股</div>';

            let stockHtml = "";
            for(let ticker of STOCKS) {
                let cache = MASTER_DATA[ticker] || { name: ticker, price: 120, change: 0 };
                let type = cache.change > 1.0 ? "WHALE" : "NORMAL";
                stockHtml += `
                    <div class="asset-row">
                        <div class="col-left"><span class="asset-name">${ticker}</span><span class="asset-tag tag-${type.toLowerCase()}">${cache.change>1?'🚀 密集突破':'---'}</span></div>
                        <div class="col-center"><span class="vol-label">STATUS</span><span class="vol-value" style="color:var(--text-sub)">🔒 休市</span></div>
                        <div class="col-right">
                            <span class="asset-price">$${cache.price.toFixed(2)}</span>
                            <span class="asset-chg" style="color:${cache.change>=0?'var(--color-up)':'var(--color-down)'}">${cache.change>=0?'+':''}${cache.change.toFixed(2)}%</span>
                        </div>
                    </div>`;
            }
            document.getElementById('stock-container').innerHTML = stockHtml || '<div style="padding:20px;color:var(--text-sub);text-align:center">請至設置頁面新增美股</div>';

            const dec = document.getElementById('jpm-decision');
            if(upCount >= 2) { dec.innerText = "🚀 JPM WEB: 多頭資金放量建倉 / 順勢做多"; dec.className = "jpm-conclusion status-buy"; }
            else { dec.innerText = "💤 JPM WEB: HOLD / 籌碼沉澱橫盤期"; dec.className = "jpm-conclusion status-hold"; }
        } catch (e) { console.error(e); }
    }

    renderChips(); updateWebTerminal();
    setInterval(updateWebTerminal, 3000); 
    setInterval(generateLiveLog, 1000);   
</script>
</body>
</html>
