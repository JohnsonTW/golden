<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JPM Command Center v36.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #06090d; --card-bg: #0d1117; --text-title: #ffffff; --text-sub: #8b949e;
            --color-up: #23c55e; --color-down: #f84444; --border-color: #21262d; --jpm-gold: #d4af37; --tw-blue: #38bdf8;
        }
        body {
            background-color: var(--bg-color); color: var(--text-title);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: calc(10px + env(safe-area-inset-top)) 12px 100px 12px;
            -webkit-user-select: none; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
        .jpm-header { text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; position: relative; }
        .jpm-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); }
        .jpm-title { font-size: 19px; font-weight: 800; margin: 2px 0; color: #f1f5f9; }
        .heartbeat-status { position: absolute; top: 12px; right: 8px; font-size: 11px; color: var(--color-up); font-weight: bold; }

        .jpm-macro-panel { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        .panel-row { display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-weight: bold; color: var(--jpm-gold); }
        .panel-value { font-family: monospace; font-size: 14px; font-weight: bold; }

        .jpm-conclusion { margin-bottom: 10px; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; text-align: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); background: #22272e; color: #cbd5e1; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index: 1000; box-sizing: border-box; }
        .nav-item { color: var(--text-sub); font-size: 10.5px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; flex: 1; text-align: center; padding: 0; margin: 0; }
        .nav-item.active { color: var(--jpm-gold); }
        .nav-icon { font-size: 17px; display: block; }

        .group-title { font-size: 12px; font-weight: bold; color: var(--text-sub); margin: 14px 0 6px 2px; }
        .asset-list { display: flex; flex-direction: column; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 10px; }
        
        .asset-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #21262d; min-height: 56px; box-sizing: border-box; }
        .asset-row:last-child { border-bottom: none; }
        
        .col-left { width: 130px; display: flex; flex-direction: column; text-align: left; }
        .col-center { width: 125px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .col-right { width: 115px; text-align: right; display: flex; flex-direction: column; }
        .col-offline { flex: 1; text-align: right; display: flex; flex-direction: column; justify-content: center; color: #8b949e; font-size: 15px; font-weight: bold; line-height: 1.4; }
        
        .state-label-box { font-size: 13px; font-weight: bold; font-family: monospace; text-align: center; width: 100%; }
        .tag-whale { background: rgba(35, 197, 94, 0.15); color: #34d399; padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(35, 197, 94, 0.3); font-size: 13px; } 
        .tag-dump { background: rgba(248, 68, 68, 0.15); color: #fee2e2; padding: 4px 6px; border-radius: 4px; border: 1px solid rgba(248, 68, 68, 0.3); font-size: 13px; }

        .asset-chg { font-size: 12.5px; font-weight: bold; font-family: monospace; margin-top: 2px; }

        /* 爆倉動能 Bar 專屬樣式 */
        .liq-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .liq-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .liq-bar-container { width: 100%; height: 12px; background: #21262d; border-radius: 6px; overflow: hidden; display: flex; margin-bottom: 6px; }
        .liq-bar-short { background: var(--color-up); height: 100%; transition: width 0.5s ease-in-out; }
        .liq-bar-long { background: var(--color-down); height: 100%; transition: width 0.5s ease-in-out; }
        .liq-data-row { display: flex; justify-content: space-between; font-size: 11px; font-family: monospace; color: var(--text-sub); }

    </style>
</head>
<body>

<div class="container">
    <div class="jpm-header">
        <div class="jpm-brand">AMULET QUANT LABORATORY</div>
        <div class="jpm-title">🔥 全球跨市場即時量化矩陣</div>
        <div id="jpm-status-indicator" class="heartbeat-status">● LIVE</div>
    </div>

    <div id="jpm-decision" class="jpm-conclusion">JPM ENGINE v36.0: LIVE DATA STREAM ACTIVE</div>

    <div id="tab-liq" class="tab-content">
        <div class="group-title">💥 LIQUIDATION MOMENTUM (實時多空爆倉量能)</div>
        <div id="liq-container">
            </div>
    </div>

    <div id="tab-crypto" class="tab-content active">
        <div class="group-title">🪙 CRYPTO PERPETUALS (Binance 實盤流速 1.5s)</div>
        <div id="crypto-container" class="asset-list"></div>
    </div>

    <div id="tab-taiwan" class="tab-content">
        <div class="group-title">🇹🇼 TAIWAN EQUITIES (等待 API 網關接入)</div>
        <div id="tw-stock-container" class="asset-list"></div>
    </div>

    <div id="tab-stock" class="tab-content">
        <div class="group-title">🇺🇸 US EQUITY STOCKS (等待 API 網關接入)</div>
        <div id="stock-container" class="asset-list"></div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" id="btn-crypto" onclick="switchTab('crypto')"><span class="nav-icon">🪙</span><span>合約</span></button>
    <button class="nav-item" id="btn-liq" onclick="switchTab('liq')"><span class="nav-icon">💥</span><span>爆倉</span></button>
    <button class="nav-item" id="btn-taiwan" onclick="switchTab('taiwan')"><span class="nav-icon">🇹🇼</span><span>台股</span></button>
    <button class="nav-item" id="btn-stock" onclick="switchTab('stock')"><span class="nav-icon">🇺🇸</span><span>美股</span></button>
</nav>

<script>
    let CRYPTOS = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "DOGEUSDT"];
    let TW_STOCKS = ["2330", "2454"];
    let US_STOCKS = ["TSM", "NVDA", "AAPL"];

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-bar button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    }

    // 真正的實戰觸發門檻：跌 4% 才是出貨，漲 4% 才是巨鯨
    function calculateLabel(change) {
        if (change > 4.0) return `<span class="tag-whale">🟩 巨鯨吸籌</span>`;
        if (change < -4.0) return `<span class="tag-dump">🟥 機構出貨</span>`;
        return "---";
    }

    // 🔥 100% 真實 Binance API 串接 (不再寫死)
    async function updateCryptoPipeline() {
        try {
            const res = await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr");
            if(!res.ok) return;
            const cryptoData = await res.json();
            let html = "";
            for(let sym of CRYPTOS) {
                let item = cryptoData.find(d => d.symbol === sym);
                if(!item) continue;
                
                // 真實價格與漲跌幅
                let price = parseFloat(item.lastPrice);
                let change = parseFloat(item.priceChangePercent);

                html += `
                    <div class="asset-row">
                        <div class="col-left"><span style="font-size:18px; font-weight:bold;">${sym.replace("USDT","")}</span></div>
                        <div class="col-center"><div class="state-label-box">${calculateLabel(change)}</div></div>
                        <div class="col-right">
                            <span style="font-size:18px; font-weight:bold; font-family:monospace;">$${price.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:4})}</span>
                            <span class="asset-chg" style="color:${change>=0?'var(--color-up)':'var(--color-down)'}">${change>=0?'+':''}${change.toFixed(2)}%</span>
                        </div>
                    </div>`;
            }
            document.getElementById('crypto-container').innerHTML = html;
        } catch (e) {
            console.error("Crypto API Fetch Error");
        }
    }

    // 💥 爆倉動能條 (目前以前端演算法模擬即時跳動，後續可接 Coinglass 或 Binance Websocket)
    function updateLiquidationBar() {
        let liqData = [
            { sym: "BTC", shortVol: Math.random()*15 + 5, longVol: Math.random()*20 + 2 },
            { sym: "ETH", shortVol: Math.random()*8 + 2, longVol: Math.random()*12 + 1 },
            { sym: "SOL", shortVol: Math.random()*5 + 1, longVol: Math.random()*8 + 2 }
        ];

        let html = "";
        for(let data of liqData) {
            let total = data.shortVol + data.longVol;
            let shortPct = (data.shortVol / total) * 100;
            let longPct = (data.longVol / total) * 100;

            html += `
            <div class="liq-card">
                <div class="liq-header">
                    <span>${data.sym} 爆倉動能 (1H)</span>
                    <span style="color:var(--text-sub)">總計: $${total.toFixed(2)}M</span>
                </div>
                <div class="liq-bar-container">
                    <div class="liq-bar-short" style="width: ${shortPct}%"></div>
                    <div class="liq-bar-long" style="width: ${longPct}%"></div>
                </div>
                <div class="liq-data-row">
                    <span style="color:var(--color-up)">空單爆倉 (燃料) $${data.shortVol.toFixed(2)}M</span>
                    <span style="color:var(--color-down)">多單爆倉 (踩踏) $${data.longVol.toFixed(2)}M</span>
                </div>
            </div>`;
        }
        document.getElementById('liq-container').innerHTML = html;
    }

    // 股票目前保持斷線狀態，等待你決定用哪個 API
    function updateStockPipeline() {
        let twHtml = "";
        for(let sym of TW_STOCKS) {
            twHtml += `<div class="asset-row"><div class="col-left"><span style="color:var(--tw-blue); font-size:18px; font-weight:bold;">${sym}</span></div><div class="col-offline">等待 API 網關</div></div>`;
        }
        document.getElementById('tw-stock-container').innerHTML = twHtml;

        let usHtml = "";
        for(let sym of US_STOCKS) {
            usHtml += `<div class="asset-row"><div class="col-left"><span style="color:var(--jpm-gold); font-size:18px; font-weight:bold;">${sym}</span></div><div class="col-offline">等待 API 網關</div></div>`;
        }
        document.getElementById('stock-container').innerHTML = usHtml;
    }

    // 初始化與輪詢
    updateCryptoPipeline();
    updateLiquidationBar();
    updateStockPipeline();
    
    setInterval(updateCryptoPipeline, 2000); // 幣安合約實盤
    setInterval(updateLiquidationBar, 3000); // 爆倉動能跳動
</script>
</body>
</html>
